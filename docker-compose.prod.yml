services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inframitra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-InfraMitra@2026}
      POSTGRES_DB: hardware_marketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inframitra -d hardware_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfraMitra Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://inframitra:${DB_PASSWORD:-InfraMitra@2026}@db:5432/hardware_marketplace
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-with-openssl-rand-base64-32}
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3001}
      UPLOAD_DIR: ./public/uploads
      # Google OAuth (optional)
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      # Microsoft OAuth (optional)
      AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID:-}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET:-}
      AUTH_MICROSOFT_ENTRA_ID_TENANT_ID: ${AUTH_MICROSOFT_ENTRA_ID_TENANT_ID:-common}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Database Migrations & Seed (run once) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://inframitra:${DB_PASSWORD:-InfraMitra@2026}@db:5432/hardware_marketplace
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        echo '✅ Migrations and seed complete!'
      "
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app

  # ── Certbot SSL (optional — run manually) ──
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    command: echo "Run manually - see instructions below"

volumes:
  pgdata:
  uploads:
  certbot-etc:
  certbot-var:
