services:
  web:
    build:
      context: .

    ports:
      - "3000:3000"

    restart: always

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: postgres://inframitra:${POSTGRES_PASSWORD}@db:5432/hardware_marketplace

  db:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: inframitra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hardware_marketplace

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inframitra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
