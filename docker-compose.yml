services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    restart: always
    environment:
      DATABASE_URL: "postgresql://inframitra:${POSTGRES_PASSWORD}@db:5432/hardware_marketplace"
      AUTH_SECRET: "${AUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inframitra
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: hardware_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inframitra -d hardware_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: "postgresql://inframitra:${POSTGRES_PASSWORD}@db:5432/hardware_marketplace"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
