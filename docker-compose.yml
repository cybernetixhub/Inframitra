services:
  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://inframitra:${POSTGRES_PASSWORD}@db:5432/hardware_marketplace"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: inframitra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hardware_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inframitra -d hardware_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Run once: docker compose run --rm migrate
  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://inframitra:${POSTGRES_PASSWORD}@db:5432/hardware_marketplace"
    command: >
      sh -c "npx prisma migrate deploy && npx prisma generate && npx prisma db seed"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
